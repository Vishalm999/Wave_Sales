Document_Date:
  column: Document_Date
  sql: TRY(DATE_PARSE(CAST("Document_Date" AS VARCHAR), '%Y%m%d'))
  supported_filters:
    - today
    - yesterday
    - this_week
    - last_week
    - this_month
    - last_month
    - this_quarter
    - last_quarter
    - this_year
    - last_year
    - current_financial_year
    - last_financial_year
    - ytd
    - qtd
    - mtd
    - fytd
    - rolling_7_days
    - rolling_14_days
    - rolling_30_days
    - rolling_60_days
    - rolling_90_days
    - rolling_6_months
    - rolling_12_months
    - custom_range
    - before_date
    - after_date
  supported_grains:
    - day
    - month
    - quarter
    - year

Booking_Created_On:
  column: Booking_Created_On
  sql: TRY(DATE_PARSE(CAST("Booking_Created_On" AS VARCHAR), '%Y%m%d'))
  supported_filters:
    - this_month
    - last_month
    - this_quarter
    - last_quarter
    - this_year
    - last_year
    - custom_range
  supported_grains:
    - month
    - quarter
    - year

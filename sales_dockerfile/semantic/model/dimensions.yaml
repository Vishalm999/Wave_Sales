# ============================================================
# STATUS BREAKDOWN DIMENSIONS
# ============================================================

possession_status:
  column: "CASE WHEN Possession_Given_On IS NOT NULL AND CAST(Possession_Given_On AS BIGINT) != 0 THEN 'Completed' WHEN Agreement_Prepared_On IS NOT NULL AND CAST(Agreement_Prepared_On AS BIGINT) != 0 AND (Possession_Given_On IS NULL OR CAST(Possession_Given_On AS BIGINT) = 0) THEN 'Pending' ELSE 'Not Started' END"
  type: categorical

agreement_status:
  column: "CASE WHEN Agreement_Prepared_On IS NOT NULL AND CAST(Agreement_Prepared_On AS BIGINT) != 0 THEN 'Completed' ELSE 'Pending' END"
  type: categorical


cancellation_reason:
  column: "Description"
  type: categorical

reason:
  column: "Description"
  type: categorical  
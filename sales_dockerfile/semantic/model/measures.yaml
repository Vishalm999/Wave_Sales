percentage_amount_received:
  sql: "CASE WHEN \"percentage_age_amount_received\" LIKE '%-' THEN -1 * TRY_CAST(REPLACE(\"percentage_age_amount_received\", '-', '') AS DECIMAL(20, 2)) ELSE TRY_CAST(\"percentage_age_amount_received\" AS DECIMAL(20, 2)) END"
  aggregation: "SUM"

loan_sanctioned_percentage:
  column: "loan_sanctioned_percentage"
  aggregation: "SUM"

# ============================================================
# KPI-ALIGNED METRICS (Based on User Requirements)
# ============================================================
# All "sales" KPIs = COUNT(DISTINCT Sales_Order)
# Base filter: Sales_Order IS NOT NULL AND Customer_Type != 'cancelled'
# ============================================================

# ============================================================
# CORE SALES COUNT METRICS (Your Primary KPIs)
# ============================================================

total_sales:
  description: Total number of unique valid sales orders (excludes cancelled)
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
  behavior: additive
  unit: Count
  business_logic: Primary KPI - count of all active sales orders

sales_count:
  description: Alias for total_sales - count of sales orders
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
  behavior: additive
  unit: Count
  business_logic: Same as total_sales, alternative name for clarity

# ============================================================

transfer_rate:
  description: Percentage of customers who transferred units
  expression: |
    CAST(COUNT(DISTINCT CASE WHEN Sold_To_Name != Payer_Name THEN Sold_To_Name END) AS DOUBLE)
    /
    NULLIF(COUNT(DISTINCT Sold_To_Name), 0) * 100
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Sold_To_Name IS NOT NULL
    - Payer_Name IS NOT NULL
  behavior: ratio
  unit: Percentage
  business_logic: Shows what percentage of customers transferred their units


# ============================================================
# POSSESSION JOURNEY METRICS
# ============================================================

possession_pending_count:
  description: Count of sales where possession has NOT been given yet (agreement given but possession pending)
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
    - Agreement_Prepared_On IS NOT NULL AND CAST(Agreement_Prepared_On AS BIGINT) != 0
    - (Possession_Given_On IS NULL OR CAST(Possession_Given_On AS BIGINT) = 0)
  behavior: additive
  unit: Count
  business_logic: Sales with agreement signed but possession not yet handed over

possession_given_count:
  description: Count of sales where possession has been given
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
    - Agreement_Prepared_On IS NOT NULL AND CAST(Agreement_Prepared_On AS BIGINT) != 0
    - Possession_Given_On IS NOT NULL AND CAST(Possession_Given_On AS BIGINT) != 0
  behavior: additive
  unit: Count
  business_logic: Completed sales with possession handed over

agreement_pending_count:
  description: Count of sales where agreement has NOT been created yet
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
    - (Agreement_Prepared_On IS NULL OR CAST(Agreement_Prepared_On AS BIGINT) = 0)
  behavior: additive
  unit: Count
  business_logic: Sales completed but agreement not yet prepared

agreement_given_count:
  description: Count of sales where agreement has been created
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
    - Agreement_Prepared_On IS NOT NULL AND CAST(Agreement_Prepared_On AS BIGINT) != 0
  behavior: additive
  unit: Count
  business_logic: Sales with agreement signed (possession may or may not be given)

# ────────────────────────────────────────────────────────
# POSSESSION STATUS BREAKDOWN (Categorical)
# ────────────────────────────────────────────────────────

possession_status_breakdown:
  description: Sales grouped by possession status
  expression: COUNT(DISTINCT Sales_Order)
  group_by: |
    CASE 
      WHEN Possession_Given_On IS NOT NULL AND CAST(Possession_Given_On AS BIGINT) != 0 THEN 'Possession Given'
      WHEN Agreement_Prepared_On IS NOT NULL AND CAST(Agreement_Prepared_On AS BIGINT) != 0 AND (Possession_Given_On IS NULL OR CAST(Possession_Given_On AS BIGINT) = 0) THEN 'Agreement Given, Possession Pending'
      WHEN Agreement_Prepared_On IS NULL OR CAST(Agreement_Prepared_On AS BIGINT) = 0 THEN 'Agreement Pending'
      ELSE 'Unknown'
    END
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
  behavior: additive
  unit: Count
  business_logic: Categorizes sales by their current stage in possession journey

# ────────────────────────────────────────────────────────
# COMPLETION RATE METRICS
# ────────────────────────────────────────────────────────

possession_completion_rate:
  description: Percentage of sales that have completed possession handover
  expression: |
    CAST(COUNT(DISTINCT CASE WHEN Possession_Given_On IS NOT NULL AND CAST(Possession_Given_On AS BIGINT) != 0 THEN Sales_Order END) AS DOUBLE)
    / NULLIF(COUNT(DISTINCT Sales_Order), 0) * 100
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
    - Agreement_Prepared_On IS NOT NULL AND CAST(Agreement_Prepared_On AS BIGINT) != 0
  behavior: ratio
  unit: Percentage
  business_logic: What % of sales with agreements have received possession

agreement_completion_rate:
  description: Percentage of sales that have agreement prepared
  expression: |
    CAST(COUNT(DISTINCT CASE WHEN Agreement_Prepared_On IS NOT NULL AND CAST(Agreement_Prepared_On AS BIGINT) != 0 THEN Sales_Order END) AS DOUBLE)
    / NULLIF(COUNT(DISTINCT Sales_Order), 0) * 100
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
  behavior: ratio
  unit: Percentage
  business_logic: What % of sales have agreements prepared


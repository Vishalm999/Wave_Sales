# ============================================================
# ADDITIONAL USEFUL METRICS
# ============================================================

total_sales_all:
  description: Total count including cancelled and transferred (for comparison)
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - Sales_Order IS NOT NULL
  behavior: additive
  unit: Count

cancellations:
  description: Total cancelled bookings
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - LOWER("Customer_Type") = 'cancelled'
  behavior: additive
  unit: Count

cancellation_value:
  description: Total value of cancelled bookings
  expression: SUM(Net_Value)
  filters:
    - LOWER("Customer_Type") = 'cancelled'
  behavior: additive
  unit: INR

cancellation_rate:
  description: Percentage of bookings cancelled
  expression: |
    CAST(COUNT(DISTINCT CASE WHEN LOWER("Customer_Type") = 'cancelled' THEN Sales_Order END) AS DOUBLE)
    /
    NULLIF(COUNT(DISTINCT Sales_Order), 0) * 100
  behavior: ratio
  unit: Percentage

# ============================================================
# AREA METRICS
# ============================================================

total_area_sold:
  description: Total area sold in square feet (excludes cancelled)
  expression: SUM(Area)
  filters:
    - Sales_Order IS NOT NULL
    - Area > 0
    - LOWER("Customer_Type") != 'cancelled'
  behavior: additive
  unit: Sq.Ft

average_rate_per_sqft:
  description: Average selling rate per square foot
  expression: |
    SUM(Net_Value) / NULLIF(SUM(Area), 0)
  filters:
    - Sales_Order IS NOT NULL
    - Area > 0
    - LOWER("Customer_Type") != 'cancelled'
  behavior: ratio
  unit: INR/Sq.Ft

# ============================================================
# COLLECTION METRICS
# ============================================================

amount_demanded_total:
  description: Total amount demanded/billed
  expression: |
    SUM(CASE 
      WHEN Amount_Demanded LIKE '%-' THEN -1 * TRY_CAST(REPLACE(Amount_Demanded, '-', '') AS DECIMAL(20, 2))
      ELSE TRY_CAST(Amount_Demanded AS DECIMAL(20, 2))
    END)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
  behavior: additive
  unit: INR

amount_received_total:
  description: Total amount received from customers
  expression: |
    SUM(CASE 
      WHEN Amount_Received LIKE '%-' THEN -1 * TRY_CAST(REPLACE(Amount_Received, '-', '') AS DECIMAL(20, 2))
      ELSE TRY_CAST(Amount_Received AS DECIMAL(20, 2))
    END)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
  behavior: additive
  unit: INR

collection_efficiency:
  description: Collection efficiency percentage (Received/Demanded)
  expression: |
    (SUM(CASE 
      WHEN Amount_Received LIKE '%-' THEN -1 * TRY_CAST(REPLACE(Amount_Received, '-', '') AS DECIMAL(20, 2))
      ELSE TRY_CAST(Amount_Received AS DECIMAL(20, 2))
    END) 
    / 
    NULLIF(SUM(CASE 
      WHEN Amount_Demanded LIKE '%-' THEN -1 * TRY_CAST(REPLACE(Amount_Demanded, '-', '') AS DECIMAL(20, 2))
      ELSE TRY_CAST(Amount_Demanded AS DECIMAL(20, 2))
    END), 0)) * 100
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
  behavior: ratio
  unit: Percentage

# ============================================================
# DISCOUNT & CHARGES
# ============================================================

total_discounts:
  description: Total discount amount offered
  expression: |
    SUM(CASE 
      WHEN Discount LIKE '%-' THEN -1 * TRY_CAST(REPLACE(Discount, '-', '') AS DECIMAL(20, 2))
      ELSE TRY_CAST(Discount AS DECIMAL(20, 2))
    END)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
  behavior: additive
  unit: INR

broker_commission:
  description: Total broker commission/discount
  expression: |
    SUM(CASE 
      WHEN Broker_Discount LIKE '%-' THEN -1 * TRY_CAST(REPLACE(Broker_Discount, '-', '') AS DECIMAL(20, 2))
      ELSE TRY_CAST(Broker_Discount AS DECIMAL(20, 2))
    END)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
  behavior: additive
  unit: INR

# ============================================================
# LOAN METRICS
# ============================================================

loan_sanctioned_total:
  description: Total home loan sanctioned amount
  expression: SUM(Loan_Sanctioned_Amount)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Loan_Sanctioned_Amount > 0
  behavior: additive
  unit: INR

average_loan_percentage:
  description: Average loan-to-value ratio
  expression: AVG(Loan_Sanctioned_percentage)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Loan_Sanctioned_percentage > 0
  behavior: average
  unit: Percentage


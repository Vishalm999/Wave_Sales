# ────────────────────────────────────────────────────────
# TIME-BASED METRICS (TAT - Turn Around Time)
# ────────────────────────────────────────────────────────

average_days_to_agreement:
  description: Average days from sale to agreement preparation
  expression: |
    AVG(
      CAST(
        date_diff('day', 
          TRY(DATE_PARSE(CAST(Document_Date AS VARCHAR), '%Y%m%d')),
          Agreement_Prepared_On
        ) AS DOUBLE
      )
    )
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
    - (Agreement_Prepared_On IS NOT NULL AND Agreement_Prepared_On != 0)
  behavior: average
  unit: Days
  business_logic: How long does it take to prepare agreement after sale

average_days_to_possession:
  description: Average days from agreement to possession handover
  expression: |
    AVG(
      CAST(
        date_diff('day', 
          Agreement_Prepared_On,
          Possession_Given_On
        ) AS DOUBLE
      )
    )
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - (Agreement_Prepared_On IS NOT NULL AND Agreement_Prepared_On != 0)
    - (Possession_Given_On IS NOT NULL AND Possession_Given_On != 0)
  behavior: average
  unit: Days
  business_logic: How long does it take to give possession after agreement

average_total_cycle_time:
  description: Average days from sale to possession (total journey time)
  expression: |
    AVG(
      CAST(
        date_diff('day', 
          TRY(DATE_PARSE(CAST(Document_Date AS VARCHAR), '%Y%m%d')),
          Possession_Given_On
        ) AS DOUBLE
      )
    )
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Document_Date IS NOT NULL
    - (Possession_Given_On IS NOT NULL AND Possession_Given_On != 0)
  behavior: average
  unit: Days
  business_logic: Total time from sale to possession completion


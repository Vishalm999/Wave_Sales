transferred_sales:
  description: Count of unique customers (Sold_To) who transferred units to different payers
  expression: COUNT(DISTINCT Sold_To_Name)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Sold_To_Name != Payer_Name
    - Sold_To_Name IS NOT NULL
    - Payer_Name IS NOT NULL
  behavior: additive
  unit: Count
  business_logic: Counts unique original buyers (Sold_To_Name) who transferred units when Sold_To differs from Payer

transfer_product_wise:
  description: Product-wise count of unique customers who transferred (Sold_To != Payer) - use with sales_group_desc dimension
  expression: COUNT(DISTINCT Sold_To_Name)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Sold_To_Name != Payer_Name
    - Sold_To_Name IS NOT NULL
    - Payer_Name IS NOT NULL
  suggested_dimensions: [sales_group_desc]
  behavior: additive
  unit: Count
  business_logic: For product-wise transfer analysis - counts unique transferred customers by product (Sales_Group_Desc)

transferred_sales_count:
  description: Count of sales orders that were transferred (Sold_To != Payer)
  expression: COUNT(DISTINCT Sales_Order)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Sold_To_Name != Payer_Name
    - Sold_To_Name IS NOT NULL
    - Payer_Name IS NOT NULL
  behavior: additive
  unit: Count
  business_logic: Alternative metric - counts sales orders (not customers) for transfers

transferred_sales_value:
  description: Total value of transferred sales (Sold_To != Payer)
  expression: SUM("net_value")
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Sold_To_Name != Payer_Name
    - Sold_To_Name IS NOT NULL
    - Payer_Name IS NOT NULL
  behavior: additive
  unit: INR
  business_logic: Total revenue from transferred units

transfer_recipients:
  description: Count of unique payers who received transferred units
  expression: COUNT(DISTINCT Payer_Name)
  filters:
    - Sales_Order IS NOT NULL
    - LOWER("Customer_Type") != 'cancelled'
    - Sold_To_Name != Payer_Name
    - Sold_To_Name IS NOT NULL
    - Payer_Name IS NOT NULL
  behavior: additive
  unit: Count
  business_logic: Counts unique customers who received transfers (final payers)

# non_transferred_sales:
